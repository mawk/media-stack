server {
    listen 80;
    server_name localhost;

    # Radarr Routing
    location /radarr {
        proxy_pass http://radarr:7878;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Sonarr Routing
    location /sonarr {
        proxy_pass http://sonarr:8989;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Prowlarr Routing (Through VPN)
    location /prowlarr {
        proxy_pass http://vpn:9696;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Jellyseerr Routing
    location /seerr {
        proxy_pass http://seerr:5055; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Automatically add the trailing slash to /jellyfin if it's missing
    location = /jellyfin {
        return 301 $scheme://$host$request_uri/;
    }

    # Your Jellyfin Routing block
    location /jellyfin/ {
        proxy_pass http://jellyfin:8096; # Cleaned: No trailing slash or text path at the end
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_buffering off;
    }

    # Jellyfin WebSockets
    location /jellyfin/socket {
        proxy_pass http://jellyfin:8096; # Cleaned: No trailing slash or text path at the end
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # qBittorrent Routing (Through VPN container)
    location /torrent/ {
        proxy_pass http://vpn:8080/; # Maps to qbt port inside your VPN container
        proxy_set_header Host http://vpn:8080;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
